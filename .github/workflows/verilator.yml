name: AeroCore-V CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  hardware-verify:
    name: Verilator RTL Simulation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Toolchain & Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y verilator make gcc g++ gcc-riscv64-unknown-elf python3-pip
        pip3 install pyelftools

    - name: Compile Bare-Metal Verification Tests
      run: |
        cd sim/tests
        make

    - name: Run Verilator Testbench
      run: |
        cd sim/verilator
        make
        # Assuming your makefile runs the compiled executable. 
        # If it just builds it, you would add: ./Vsoc_top (or whatever the executable is named)